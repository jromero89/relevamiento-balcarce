<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevamiento de campo – Balcarce – Cuadrante NORTE</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  #map { height:100vh; }

  #titulo {
    position: absolute; top:10px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.95); padding:6px 16px; border-radius:6px;
    z-index:1000; font-size:14px; font-weight:600; box-shadow:0 1px 5px rgba(0,0,0,0.3);
    white-space:nowrap;
  }

  #contador {
    position: absolute; top:54px; right:10px; background:rgba(255,255,255,0.95);
    padding:8px 14px; border-radius:6px; z-index:1000; font-size:14px;
    box-shadow:0 1px 5px rgba(0,0,0,0.3);
  }

  #btn-reiniciar {
    position: absolute; top:54px; left:10px; background:#fff; border:1px solid #ccc;
    padding:6px 14px; border-radius:4px; cursor:pointer; z-index:1000;
    font-size:13px; box-shadow:0 1px 5px rgba(0,0,0,0.15);
  }

  #estado-gps {
    position: absolute; bottom:10px; left:10px; background:rgba(255,255,255,0.95);
    padding:5px 10px; border-radius:6px; z-index:1000; font-size:12px; color:#555;
    box-shadow:0 1px 5px rgba(0,0,0,0.3);
  }

  #info-panel {
    position: absolute; bottom:30px; left:50%; transform:translateX(-50%);
    background:#fff; padding:14px 22px; border-radius:10px; box-shadow:0 2px 14px rgba(0,0,0,0.35);
    z-index:1000; display:none; text-align:center; max-width:92%;
  }
  #info-panel p { margin:0 0 10px 0; font-size:15px; }
  #info-panel button {
    margin:0 6px; padding:8px 18px; border:none; border-radius:6px; cursor:pointer;
    font-size:14px; font-weight:600;
  }
  #btn-confirmar { background:#43a047; color:#fff; }
  #btn-ignorar { background:#e53935; color:#fff; }
</style>
</head>
<body>
<div id="map"></div>
<div id="titulo">Cuadrante NORTE – Relevamiento</div>
<div id="contador">0 de 0 tramos relevados (0%)</div>
<button id="btn-reiniciar">Reiniciar progreso</button>
<div id="estado-gps">GPS: esperando señal…</div>
<div id="info-panel">
  <p id="info-text"></p>
  <button id="btn-confirmar">Confirmar</button>
  <button id="btn-ignorar">Ignorar</button>
</div>

desd": 0.0, "alturahast": 0.0, "anchoinici": 0.0, "anchofinal": 0.0, "nombre": null, "tipo": null, "tramo_id": 119}}, {"type": "Feature", "geometry": {"type": "MultiLineString", "coordinates": [[[-58.2684422168667, -37.83247259951123], [-58.270345077229216, -37.83099161605843]]]}, "properties": {"alturadesd": 0.0, "alturahast": 0.0, "anchoinici": 0.0, "anchofinal": 0.0, "nombre": null, "tipo": null, "tramo_id": 120}}, {"type": "Feature", "geometry": {"type": "MultiLineString", "coordinates": [[[-58.27128287549361, -37.83248927176172], [-58.27238714872669, -37.83329609614032]]]}, "properties": {"alturadesd": 0.0, "alturahast": 0.0, "anchoinici": 0.0, "anchofinal": 0.0, "nombre": null, "tipo": null, "tramo_id": 121}}, {"type": "Feature", "geometry": {"type": "MultiLineString", "coordinates": [[[-58.2728954529684, -37.83607682578528], [-58.27477375862664, -37.83454836860907]]]}, "properties": {"alturadesd": 0.0, "alturahast": 0.0, "anchoinici": 0.0, "anchofinal": 0.0, "nombre": null, "tipo": null, "tramo_id": 122}}, {"type": "Feature", "geometry": {"type": "MultiLineString", "coordinates": [[[-58.289803962240086, -37.84369989732497], [-58.293585594914944, -37.840749759605856]]]}, "properties": {"alturadesd": 0.0, "alturahast": 0.0, "anchoinici": 0.0, "anchofinal": 0.0, "nombre": null, "tipo": null, "tramo_id": 123}}, {"type": "Feature", "geometry": {"type": "MultiLineString", "coordinates": [[[-58.27121631397068, -37.831743217999886], [-58.269391775184374, -37.83320081035974]]]}, "properties": {"alturadesd": null, "alturahast": null, "anchoinici": null, "anchofinal": null, "nombre": null, "tipo": null, "tramo_id": 124}}]};

const CUADRANTE = "NORTE";
const MAP_CENTER = [-37.83649902200551, -58.2765421211067];   // [lat, lon]
const MAP_ZOOM = 15;

// Umbral de detección en metros. 35 m porque el relevamiento es en vehículo
// (a pie conviene bajarlo a 20-25 m para mayor precisión).
const UMBRAL_METROS = 35;

// Velocidad mínima (km/h) para considerar el movimiento como desplazamiento real
// y no ruido de GPS estando detenido. Si vas muy lento/parado, no recalcula candidato.
const VELOCIDAD_MIN_KMH = 3;

const STORAGE_KEY = 'balcarce_relevamiento_' + CUADRANTE;

// ------------------------------------------------------------
const map = L.map('map').setView(MAP_CENTER, MAP_ZOOM);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

let tramos = [];          // { id, nombre, tipo, layer, segments: [[latlng,latlng], ...] }
let confirmados = new Set();
let marker = null;
let lastLatLng = null;
let lastTimestamp = null;
let currentCandidateId = null;

function cargarProgreso() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { confirmados = new Set(JSON.parse(saved)); } catch(e) { confirmados = new Set(); }
  }
}

function guardarProgreso() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...confirmados]));
}

function reiniciarProgreso() {
  confirmados.clear();
  guardarProgreso();
  location.reload();
}

// Distancia en metros de un punto a un segmento (proyección sobre el segmento)
function distPuntoSegmento(latlng, segA, segB) {
  const p = latlng, a = segA, b = segB;
  const ab = b.distanceTo(a);
  if (ab === 0) return p.distanceTo(a);
  const d = ((p.lat - a.lat) * (b.lat - a.lat) + (p.lng - a.lng) * (b.lng - a.lng)) / (ab * ab);
  let proj;
  if (d <= 0) proj = a;
  else if (d >= 1) proj = b;
  else proj = L.latLng(a.lat + d * (b.lat - a.lat), a.lng + d * (b.lng - a.lng));
  return p.distanceTo(proj);
}

function construirEtiqueta(props) {
  let label = props.nombre ? props.nombre : '(sin nombre)';
  if (props.alturadesd || props.alturahast) {
    label += ` (altura ${props.alturadesd}-${props.alturahast})`;
  }
  if (props.tipo) label += ` [${props.tipo}]`;
  return label;
}

function cargarTramos() {
  tramos = [];
  geojsonData.features.forEach(feature => {
    const id = feature.properties.tramo_id;
    const color = confirmados.has(id) ? '#2e7d32' : '#d32f2f';

    // MultiLineString: puede tener una o varias sub-líneas
    const segmentsLatLng = [];
    feature.geometry.coordinates.forEach(sub => {
      const pts = sub.map(c => L.latLng(c[1], c[0])); // [lon,lat] -> latlng
      for (let i = 0; i < pts.length - 1; i++) {
        segmentsLatLng.push([pts[i], pts[i + 1]]);
      }
    });

    const layer = L.polyline(
      feature.geometry.coordinates.map(sub => sub.map(c => [c[1], c[0]])),
      { color: color, weight: 5, opacity: 0.85 }
    ).addTo(map);

    layer.bindTooltip(construirEtiqueta(feature.properties));

    tramos.push({
      id: id,
      props: feature.properties,
      layer: layer,
      segments: segmentsLatLng
    });
  });
  actualizarContador();
}

function actualizarContador() {
  const total = tramos.length;
  const hechos = tramos.filter(t => confirmados.has(t.id)).length;
  const pct = total ? Math.round((hechos / total) * 100) : 0;
  document.getElementById('contador').textContent = `${hechos} de ${total} tramos relevados (${pct}%)`;
}

function confirmarTramo(tramo) {
  confirmados.add(tramo.id);
  tramo.layer.setStyle({ color: '#2e7d32' });
  guardarProgreso();
  actualizarContador();
  ocultarPanel();
  currentCandidateId = null;
}

function ocultarPanel() {
  document.getElementById('info-panel').style.display = 'none';
}

function mostrarPanel(tramo) {
  document.getElementById('info-text').textContent =
    `¿Confirmar ${construirEtiqueta(tramo.props)} como relevado?`;
  document.getElementById('info-panel').style.display = 'block';
  document.getElementById('btn-confirmar').onclick = () => confirmarTramo(tramo);
  document.getElementById('btn-ignorar').onclick = () => ocultarPanel();
}

function buscarTramoMasCercano(latlng) {
  let best = null;
  let bestDist = Infinity;
  tramos.forEach(t => {
    if (confirmados.has(t.id)) return;
    t.segments.forEach(([a, b]) => {
      const d = distPuntoSegmento(latlng, a, b);
      if (d < bestDist) {
        bestDist = d;
        best = t;
      }
    });
  });
  return { tramo: best, dist: bestDist };
}

function onPositionUpdate(pos) {
  const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
  const now = pos.timestamp || Date.now();

  document.getElementById('estado-gps').textContent =
    `GPS: activo (precisión ±${Math.round(pos.coords.accuracy)} m)`;

  if (!marker) {
    marker = L.marker(latlng).addTo(map);
  } else {
    marker.setLatLng(latlng);
  }

  // Calcular velocidad aproximada para filtrar ruido cuando está detenido
  let velocidadKmh = null;
  if (lastLatLng && lastTimestamp) {
    const distM = latlng.distanceTo(lastLatLng);
    const dtSeg = (now - lastTimestamp) / 1000;
    if (dtSeg > 0) velocidadKmh = (distM / dtSeg) * 3.6;
  }
  lastLatLng = latlng;
  lastTimestamp = now;

  // Si está claramente detenido, no tocar el panel actual (evita parpadeo en esquinas)
  if (velocidadKmh !== null && velocidadKmh < VELOCIDAD_MIN_KMH && currentCandidateId !== null) {
    return;
  }

  const { tramo, dist } = buscarTramoMasCercano(latlng);

  if (tramo && dist < UMBRAL_METROS) {
    if (currentCandidateId !== tramo.id) {
      currentCandidateId = tramo.id;
      mostrarPanel(tramo);
    }
  } else {
    if (currentCandidateId !== null) {
      currentCandidateId = null;
      ocultarPanel();
    }
  }
}

function onPositionError(err) {
  document.getElementById('estado-gps').textContent = 'GPS: error – ' + err.message;
}

// init
cargarProgreso();
cargarTramos();

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(onPositionUpdate, onPositionError, {
    enableHighAccuracy: true,
    maximumAge: 3000,
    timeout: 10000
  });
} else {
  document.getElementById('estado-gps').textContent = 'GPS no soportado en este navegador.';
}

document.getElementById('btn-reiniciar').addEventListener('click', () => {
  if (confirm('¿Reiniciar todo el progreso de este cuadrante? Se perderán los tramos confirmados.')) {
    reiniciarProgreso();
  }
});
</script>
